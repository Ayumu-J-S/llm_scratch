defaults:
  - tokenizer: canonical
  - _self_
  - profile: smoke_overfit

data:
  # Keep the canonical stream shape visible in the base config. Profiles fill
  # the immutable source lists and mode-specific values through composition.
  streaming:
    require_manifests: true
    train:
      max_tokens: max
    validation:
      max_tokens: max

reproducibility:
  seed: 42
  deterministic: true
  reject_dirty: true

training:
  # Explicit work budgets and independent event cadences. Profiles provide
  # sequence_length/epochs/batch_size; null budgets retain their epoch horizon.
  max_steps: null
  max_tokens: null
  max_time: null
  log_every_n_steps: 1
  log_every_n_tokens: null
  validation_every_n_steps: null
  validation_every_n_tokens: null
  checkpoint_every_n_steps: null
  checkpoint_every_n_tokens: null
  milestone_every_n_steps: null
  milestone_every_n_tokens: null
  # CPU smoke is deliberately full precision. CUDA pretraining/stability
  # profiles select BF16 explicitly rather than relying on device defaults.
  precision: fp32
  gradient_accumulation_steps: 1
  max_grad_norm: 10.0
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0003
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.1
  scheduler:
    enabled: false
    interval: step
    _target_: training.optimization.WarmupCosineScheduler
    warmup_steps: 100
    decay_steps: 10000
    min_lr_ratio: 0.1

model:
  embed_size: 384
  num_heads: 6
  num_layers: 6
  dropout: 0.1

artifacts:
  # Relative paths live beneath Hydra's per-run output directory. An absolute
  # path is allowed for an operator-managed recovery location.
  checkpoints_dir: checkpoints
  keep_last_n: 3
  # Explicit operational override. It is intentionally excluded from the
  # experiment identity so the same run may resume from its recovery file.
  # Use a recovery file/directory or `latest` for this run's checkpoint dir.
  resume_path: null

# Benchmark-only operational phase/resource capture. The full section remains
# in resolved evidence but is excluded from training/checkpoint experiment
# identity. Disabled runs do not create CUDA events, call an explicit CUDA
# synchronization, or write a separate measurement artifact.
measurement:
  enabled: false
  warmup_optimizer_steps: 10
  cuda_events: true
  # Relative paths resolve beside artifacts.checkpoints_dir, never beneath it.
  # Any checkpoint-directory path or hardlink to a checkpoint is rejected.
  output_path: null

wandb:
  # Local metrics/manifests/checkpoints remain authoritative in every mode.
  mode: disabled  # disabled | offline | online
  project: llm-scratch
  entity: sunday-research
  name: null
  init_timeout_seconds: 10
  log_timeout_seconds: 5
  finish_timeout_seconds: 30
  watch:
    enabled: false
    log: gradients
    log_freq: 1000
  artifact:
    policy: none  # none | best | final | milestone
    usage_snapshot_path: null
    max_usage_age_seconds: 900
    reserve_bytes: 0
    upload_timeout_seconds: 600

hydra:
  run:
    dir: ${hydra:runtime.cwd}/runs/${profile.name}/${now:%Y%m%d-%H%M%S}
  output_subdir: null
  job:
    chdir: false
