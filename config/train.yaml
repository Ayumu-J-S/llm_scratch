defaults:
  - tokenizer: canonical
  - _self_
  - profile: smoke_overfit

data:
  # Keep the canonical stream shape visible in the base config. Profiles fill
  # the immutable source lists and mode-specific values through composition.
  streaming:
    require_manifests: true
    train:
      max_tokens: max
    validation:
      max_tokens: max

reproducibility:
  seed: 42
  deterministic: true
  reject_dirty: true

training:
  # Explicit work budgets and independent event cadences. Profiles provide
  # sequence_length/epochs/batch_size; null budgets retain their epoch horizon.
  max_steps: null
  max_tokens: null
  max_time: null
  log_every_n_steps: 1
  log_every_n_tokens: null
  validation_every_n_steps: null
  validation_every_n_tokens: null
  checkpoint_every_n_steps: null
  checkpoint_every_n_tokens: null
  milestone_every_n_steps: null
  milestone_every_n_tokens: null
  # CPU smoke is deliberately full precision. CUDA pretraining/stability
  # profiles select BF16 explicitly rather than relying on device defaults.
  precision: fp32
  gradient_accumulation_steps: 1
  max_grad_norm: 10.0
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0003
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.1
  scheduler:
    enabled: false
    interval: step
    _target_: training.optimization.WarmupCosineScheduler
    warmup_steps: 100
    decay_steps: 10000
    min_lr_ratio: 0.1

model:
  embed_size: 384
  num_heads: 6
  num_layers: 6
  dropout: 0.1

artifacts:
  # Relative paths live beneath Hydra's per-run output directory. An absolute
  # path is allowed for an operator-managed recovery location.
  checkpoints_dir: checkpoints
  keep_last_n: 3
  # Explicit operational override. It is intentionally excluded from the
  # experiment identity so the same run may resume from its recovery file.
  # Use a recovery file/directory or `latest` for this run's checkpoint dir.
  resume_path: null

wandb:
  enabled: true
  project: llm-scratch
  entity: sunday-research
  name: null
  mode: online
  log_model_every_n_epoch: null

hydra:
  run:
    dir: ${hydra:runtime.cwd}/runs/${profile.name}/${now:%Y%m%d-%H%M%S}
  output_subdir: null
  job:
    chdir: false
