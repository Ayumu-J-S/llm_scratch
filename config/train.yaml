data:
  mode: memorization_smoke
  memorization:
    manifest_path: tests/fixtures/data_manifests/memorization.manifest.json
    expected_fingerprint: 00c3797a7d0eda13950fd699a60c45fcd388829f016479caaeb369438767bd31
  streaming:
    require_manifests: true
    cache:
      dir: data/stream_loader_cache
      max_size_bytes: 750000000000
    prefetch:
      enabled: true
      buffer_size: 16
    train:
      max_tokens: max
      add_eos: true
      seed: 42
      sources:
        - name: bilingual_fixture_train
          type: manifest
          manifest_path: tests/fixtures/data_manifests/bilingual.manifest.json
          expected_fingerprint: 47cca88c4a5595e27eb5d60d99918fb77c30b23f7c0ae98024153f25e14ffc19
          selection: train
          ratio: 1.0
    validation:
      max_tokens: max
      add_eos: true
      seed: 43
      sources:
        - name: bilingual_fixture_validation
          type: manifest
          manifest_path: tests/fixtures/data_manifests/bilingual.manifest.json
          expected_fingerprint: 47cca88c4a5595e27eb5d60d99918fb77c30b23f7c0ae98024153f25e14ffc19
          selection: validation
          ratio: 1.0

training:
  sequence_length: 64
  epochs: 50
  batch_size: 64
  shuffle: true
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.001
    weight_decay: 0.0
  scheduler:
    enabled: false
    interval: epoch
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${training.epochs}
    eta_min: 0.0

model:
  embed_size: 384
  num_heads: 6
  num_layers: 6
  dropout: 0.1

artifacts:
  checkpoints_dir: artifacts/checkpoints
  tokenizers_dir: artifacts/tokenizers
  tokenizer_filename: tokenizer.json

wandb:
  enabled: true
  project: llm-scratch
  entity: sunday-research
  name: null
  mode: online
  log_model_every_n_epoch: null

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
