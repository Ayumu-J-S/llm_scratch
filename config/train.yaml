data:
  mode: local_text
  train: data/inputLearnText.txt
  val: data/inputLearnText.txt
  streaming:
    cache:
      dir: data/stream_loader_cache
      max_size_bytes: 750000000000
    prefetch:
      enabled: true
      buffer_size: 16
    train:
      max_tokens: 1000000
      add_eos: true
      seed: 42
      sources: []
    validation:
      max_tokens: 100000
      add_eos: true
      seed: 43
      sources: []

runtime:
  device: cuda

training:
  sequence_length: 64
  epochs: 50
  batch_size: 64
  shuffle: true
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.001
    weight_decay: 0.0
  scheduler:
    enabled: false
    interval: epoch
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${training.epochs}
    eta_min: 0.0

model:
  embed_size: 384
  num_heads: 6
  num_layers: 6
  dropout: 0.1

artifacts:
  checkpoints_dir: artifacts/checkpoints
  tokenizers_dir: artifacts/tokenizers
  tokenizer_filename: tokenizer.json

wandb:
  enabled: true
  project: llm-scratch
  entity: sunday-research
  name: null
  mode: online
  log_model_every_n_epoch: null

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
