defaults:
  - tokenizer: canonical
  - profile: smoke_overfit
  - _self_

data:
  # Keep the canonical stream shape visible in the base config. Profiles fill
  # the immutable source lists and mode-specific values through composition.
  streaming:
    require_manifests: true
    train:
      max_tokens: max
    validation:
      max_tokens: max

reproducibility:
  seed: 42
  deterministic: true
  reject_dirty: true

training:
  # Explicit work budgets and independent event cadences. Profiles provide
  # sequence_length/epochs/batch_size; null budgets retain their epoch horizon.
  max_steps: null
  max_tokens: null
  max_time: null
  log_every_n_steps: 1
  validation_every_n_steps: null
  checkpoint_every_n_steps: null
  milestone_every_n_steps: null
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.001
    weight_decay: 0.0
  scheduler:
    enabled: false
    interval: epoch
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${training.epochs}
    eta_min: 0.0

model:
  embed_size: 384
  num_heads: 6
  num_layers: 6
  dropout: 0.1

artifacts:
  checkpoints_dir: artifacts/checkpoints

wandb:
  enabled: true
  project: llm-scratch
  entity: sunday-research
  name: null
  mode: online
  log_model_every_n_epoch: null

hydra:
  run:
    dir: ${hydra:runtime.cwd}/runs/${profile.name}/${now:%Y%m%d-%H%M%S}
  output_subdir: null
  job:
    chdir: false
