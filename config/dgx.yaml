# DGX-001 host orchestration policy. Training itself always composes one of the
# canonical profile configs; this file only declares the repeated matrix and
# hard resource gates around those runs.
schema_version: 3
image:
  name: llm-scratch:env-001
  # Updated only when a content-addressed Docker build input intentionally changes.
  expected_runtime_spec_sha256: 9caeb915d8aa16437d1cbd28b9a435ced98c4c8bb674110b12a14a0d7fcf0b23

# Measurements are valid only on the single-GPU DGX Spark target. The CUDA and
# host-visible totals are equal on this GB10 unified-memory system.
hardware:
  architecture: aarch64
  gpu_name: NVIDIA GB10
  device_count: 1
  compute_capability: [12, 1]
  min_unified_memory_bytes: 120000000000
  max_unified_memory_bytes: 140000000000
  require_equal_host_device_memory: true

matrix:
  repetitions: 3
  warmup_optimizer_steps: 10
  measured_optimizer_steps: 20
  model_presets:
    - id: p70
      num_layers: 18
      embed_size: 384
      num_heads: 6
    - id: p85
      num_layers: 26
      embed_size: 384
      num_heads: 6
    - id: p99
      num_layers: 34
      embed_size: 384
      num_heads: 6
  context_presets:
    - id: ctx1024
      sequence_length: 1024
      batch_size: 8
      gradient_accumulation_steps: 4
    - id: ctx2048
      sequence_length: 2048
      batch_size: 4
      gradient_accumulation_steps: 4
    - id: ctx4096
      sequence_length: 4096
      batch_size: 2
      gradient_accumulation_steps: 4

decomposition:
  repetitions: 3
  warmup_optimizer_steps: 10
  measured_optimizer_steps: 20

pilot:
  duration_seconds: 1800
  # Hold back the final 120 seconds from optimizer work. Matrix evidence must
  # show that one worst observed update/event tail plus the final checkpoint,
  # with a 2x margin, fits this reserve before a candidate can be selected.
  finalization_reserve_seconds: 120
  warmup_optimizer_steps: 10
  validation_target_tokens: 65536
  validation_every_target_tokens: 5000000
  recovery_every_target_tokens: 2500000
  milestone_every_target_tokens: 100000000
  log_every_optimizer_steps: 25

gates:
  min_available_memory_bytes: 64000000000
  # Stop writes before the human-required 100 GB machine reserve can be crossed.
  min_free_disk_bytes: 120000000000
  post_plan_free_reserve_bytes: 100000000000
  max_temperature_c: 80
  max_swap_in_pages: 0
  max_swap_out_pages: 0
  max_allocator_growth_bytes: 268435456
  min_sampler_coverage: 0.90
  min_gpu_metric_coverage: 0.90
  max_telemetry_gap_factor: 2.5
  max_data_wait_fraction: 0.10
  min_loader_supply_ratio: 1.20
  matrix_output_reserve_bytes: 100000000000
  post_matrix_evidence_reserve_bytes: 20000000000
  storage_headroom_ratio: 2.0

selection:
  target_tokens_7d: 1000000000
  conservative_throughput_quantile: min
  max_slowdown_fraction: 0.20
  context_throughput_floor_fraction: 0.85
  max_repeat_spread_fraction: 0.10

output_root: null
cache_root: null
expected_commit: null
mode: plan  # plan | matrix | decompose | pilot
selected_candidate: null
matrix_summary_path: null

hydra:
  run:
    dir: ${hydra:runtime.cwd}/runs/dgx-orchestration/${now:%Y%m%d-%H%M%S}
  output_subdir: null
  job:
    chdir: false
