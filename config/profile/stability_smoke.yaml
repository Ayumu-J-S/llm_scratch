# @package _global_
# Bounded real training-path smoke for STAB-001. It repeats only the pinned
# fixture until its explicit 100 optimizer-step horizon; it is not a quality or
# throughput experiment.
profile:
  name: stability_smoke
  purpose: pretraining

runtime:
  device: cuda

data:
  mode: streaming
  streaming:
    require_manifests: true
    repeat: true
    cache:
      dir: data/stream_loader_cache
      max_size_bytes: 80000000000
      min_free_bytes: 256000000000
      wait_timeout_seconds: 120.0
    prefetch:
      enabled: true
      buffer_size: 16
    train:
      max_tokens: 8192
      add_eos: true
      seed: 42
      sources:
        - name: bilingual_fixture_train
          type: manifest
          manifest_path: tests/fixtures/data_manifests/bilingual.manifest.json
          expected_fingerprint: 47cca88c4a5595e27eb5d60d99918fb77c30b23f7c0ae98024153f25e14ffc19
          selection: train
          ratio: 1.0
    validation:
      max_tokens: max
      add_eos: true
      seed: 43
      sources:
        - name: bilingual_fixture_validation
          type: manifest
          manifest_path: tests/fixtures/data_manifests/bilingual.manifest.json
          expected_fingerprint: 47cca88c4a5595e27eb5d60d99918fb77c30b23f7c0ae98024153f25e14ffc19
          selection: validation
          ratio: 1.0

training:
  sequence_length: 8
  epochs: 1
  batch_size: 2
  shuffle: true
  max_steps: 100
  precision: bf16
  gradient_accumulation_steps: 4
  max_grad_norm: 10.0
  log_every_n_steps: 10
  validation_every_n_steps: null
  checkpoint_every_n_steps: null
  milestone_every_n_steps: null
  scheduler:
    enabled: true
    interval: step
    _target_: training.optimization.WarmupCosineScheduler
    warmup_steps: 10
    decay_steps: 100
    min_lr_ratio: 0.1

wandb:
  mode: disabled
