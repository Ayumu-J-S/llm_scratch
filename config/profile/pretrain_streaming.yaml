# @package _global_
# Canonical pinned bilingual stream profile. Every source uses the same
# content-hash split policy, so train/validation membership is cross-source safe.
profile:
  name: pretrain_streaming
  purpose: pretraining

runtime:
  device: cuda

data:
  mode: streaming
  streaming:
    require_manifests: true
    # Exact checkpoint resume needs StreamLoader's explicit cursor policy.
    # A completed finite pass starts its deterministic next pass; repeat is
    # explicit so a bounded optimizer horizon never silently replays a prefix.
    repeat: true
    cache:
      dir: data/stream_loader_cache
      max_size_bytes: 80000000000
      min_free_bytes: 256000000000
      wait_timeout_seconds: 120.0
    prefetch:
      enabled: true
      buffer_size: 16
    train:
      max_tokens: max
      max_target_tokens: 262144
      mixture_basis: trained_targets
      add_eos: true
      seed: 42
      sources:
        - name: fineweb2_ja_train
          type: manifest
          manifest_path: data/manifests/fineweb2-ja-jpn-jpan.manifest.json
          expected_fingerprint: 2fc3eb60986c96fcb752b14d740dd5a3f7cea8b52bb5a13cb5834a1f805d6bba
          selection: train
          ratio: 0.5
        - name: fineweb_en_train
          type: manifest
          manifest_path: data/manifests/fineweb-en-sample-10bt.manifest.json
          expected_fingerprint: 626a1eb095e9089e5c62ee2df9c058ab7c6dfc54064eca5c13e4d84e65a8d60a
          selection: train
          ratio: 0.5
    validation:
      max_tokens: max
      max_target_tokens: 65536
      mixture_basis: trained_targets
      add_eos: true
      seed: 43
      sources:
        - name: fineweb2_ja_validation
          type: manifest
          manifest_path: data/manifests/fineweb2-ja-jpn-jpan.manifest.json
          expected_fingerprint: 2fc3eb60986c96fcb752b14d740dd5a3f7cea8b52bb5a13cb5834a1f805d6bba
          selection: validation
          ratio: 0.5
        - name: fineweb_en_validation
          type: manifest
          manifest_path: data/manifests/fineweb-en-sample-10bt.manifest.json
          expected_fingerprint: 626a1eb095e9089e5c62ee2df9c058ab7c6dfc54064eca5c13e4d84e65a8d60a
          selection: validation
          ratio: 0.5

training:
  sequence_length: 8
  epochs: 1
  batch_size: 2
  shuffle: true
  precision: bf16
  gradient_accumulation_steps: 4
  max_grad_norm: 10.0
  scheduler:
    enabled: true
    interval: step
    _target_: training.optimization.WarmupCosineScheduler
    warmup_steps: 100
    decay_steps: 10000
    min_lr_ratio: 0.1
