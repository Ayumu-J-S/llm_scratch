# @package _global_
# GATE-001 is a bounded, fixed-fixture memorization proof.  Its auxiliary
# source exists only to exercise the normal disjoint streaming-loader contract;
# no validation event is configured and no result is called validation.
profile:
  name: gate_overfit
  purpose: memorization_gate

runtime:
  device: cuda

data:
  mode: streaming
  streaming:
    require_manifests: true
    repeat: true
    prefetch:
      enabled: true
      buffer_size: 2
    train:
      max_tokens: max
      add_eos: true
      seed: 20260712
      sources:
        - name: gate_overfit_train_v1
          type: manifest
          manifest_path: tests/fixtures/gate_overfit/v1/train.manifest.json
          expected_fingerprint: 8e40a0619b1f93cfcdb84a299ed437d5193df0382c5fa7c2e5f2e0e8a775628a
          selection: all
          ratio: 1.0
    validation:
      max_tokens: max
      add_eos: true
      seed: 20260713
      sources:
        - name: gate_overfit_auxiliary_v1
          type: manifest
          manifest_path: tests/fixtures/gate_overfit/v1/auxiliary.manifest.json
          expected_fingerprint: eca88f8008d0988f92b6a6998fff80d8a1269d5c1ae8bb40023b7e214ef48f5c
          selection: all
          ratio: 1.0

training:
  sequence_length: 16
  epochs: 1
  batch_size: 2
  shuffle: false
  max_steps: 200
  max_tokens: null
  max_time: null
  precision: bf16
  gradient_accumulation_steps: 1
  max_grad_norm: 10.0
  log_every_n_steps: 1
  validation_every_n_steps: null
  validation_every_n_tokens: null
  checkpoint_every_n_steps: 100
  checkpoint_every_n_tokens: null
  milestone_every_n_steps: null
  milestone_every_n_tokens: null
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.02
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0
  scheduler:
    enabled: false
    interval: step
    _target_: training.optimization.WarmupCosineScheduler
    warmup_steps: 1
    decay_steps: 200
    min_lr_ratio: 0.1

model:
  embed_size: 32
  num_heads: 4
  num_layers: 1
  dropout: 0.0

artifacts:
  checkpoints_dir: checkpoints
  keep_last_n: 2
  resume_path: null

wandb:
  enabled: false
