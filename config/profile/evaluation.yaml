# @package _global_
# Standalone checkpoint evaluation profile. The evaluator takes model/data
# authority from the checkpoint's resolved Hydra config; these values are
# operational output/device/W&B controls only.
profile:
  name: evaluation
  purpose: evaluation
  task: evaluate_checkpoint

evaluation:
  checkpoint_path: null
  output_path: evaluation.json
  # Canonical pretraining checkpoints own BF16 precision, so standalone
  # evaluation defaults to the compatible CUDA path. FP32 fixture checkpoints
  # may opt into CPU explicitly with evaluation.device=cpu.
  device: cuda
  wandb:
    mode: disabled
    project: llm-scratch
    entity: sunday-research
    name: null
    init_timeout_seconds: 10
    finish_timeout_seconds: 30

runtime:
  device: ${evaluation.device}

data:
  mode: streaming
  streaming:
    require_manifests: true
    train:
      max_tokens: max
      add_eos: true
      seed: 42
      sources:
        - name: bilingual_fixture_train
          type: manifest
          manifest_path: tests/fixtures/data_manifests/bilingual.manifest.json
          expected_fingerprint: 47cca88c4a5595e27eb5d60d99918fb77c30b23f7c0ae98024153f25e14ffc19
          selection: train
          ratio: 1.0
    validation:
      max_tokens: max
      add_eos: true
      seed: 43
      sources:
        - name: bilingual_fixture_validation
          type: manifest
          manifest_path: tests/fixtures/data_manifests/bilingual.manifest.json
          expected_fingerprint: 47cca88c4a5595e27eb5d60d99918fb77c30b23f7c0ae98024153f25e14ffc19
          selection: validation
          ratio: 1.0

training:
  sequence_length: 8
  epochs: 1
  batch_size: 2
  shuffle: false
