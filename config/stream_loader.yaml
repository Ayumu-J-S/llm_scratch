defaults:
  - tokenizer: canonical
  - _self_

output_mode: raw_text
max_tokens: 5000000000
sequence_length: 4096
add_eos: true
preserve_metadata: true
require_manifests: true
seed: 42

# DATA-003: bounded, deterministic stream horizon.  Keep repeat explicit for
# experiments that intentionally replay a corpus; the default is sequential
# continuation from the saved cursor.
horizon:
  repeat: false
  shuffle: true
  shuffle_buffer_size: 16

prefetch:
  enabled: true
  buffer_size: 16
  mode: thread

retry:
  max_attempts: 5
  initial_delay_seconds: 1.0
  max_delay_seconds: 60.0
  multiplier: 2.0

cache:
  dir: data/stream_loader_cache
  max_size_bytes: 80000000000
  min_free_bytes: 256000000000
  wait_timeout_seconds: 120.0

datasets:
  - name: bilingual_fixture_train
    type: manifest
    manifest_path: tests/fixtures/data_manifests/bilingual.manifest.json
    expected_fingerprint: 47cca88c4a5595e27eb5d60d99918fb77c30b23f7c0ae98024153f25e14ffc19
    selection: train
    ratio: 1.0
